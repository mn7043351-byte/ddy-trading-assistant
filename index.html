<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDY Trading Assistant - Advanced Matrix</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                        mono: ['Courier New', 'monospace'],
                    },
                    colors: {
                        cyber: {
                            dark: '#030014',
                            darker: '#010008',
                            panel: 'rgba(10, 10, 31, 0.65)',
                            cyan: '#00f0ff',
                            pink: '#ff003c',
                            purple: '#bd00ff',
                            yellow: '#fcee0a',
                            green: '#39ff14'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'marquee': 'marquee 35s linear infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #030014; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: -1; perspective: 1000px; }
        
        h1, h2, h3, h4, .font-display { font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em; }
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-track { background: rgba(0, 240, 255, 0.05); }
        .terminal-scroll::-webkit-scrollbar-thumb { background-color: #00f0ff; border-radius: 10px; }
        
        /* ADVANCED CYBER PANEL WITH GLASSMORPHISM */
        .cyber-panel { 
            background: linear-gradient(135deg, rgba(10, 10, 31, 0.8) 0%, rgba(3, 0, 20, 0.95) 100%);
            border: 1px solid rgba(0, 240, 255, 0.15); 
            box-shadow: 0 8px 32px 0 rgba(0, 240, 255, 0.07); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cyber-panel:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 15px 40px 0 rgba(0, 240, 255, 0.15);
            border-color: rgba(0, 240, 255, 0.4);
            z-index: 10;
        }

        /* FLOATING ANIMATIONS FOR CARDS */
        .float-fast { animation: float-anim 4s ease-in-out infinite; }
        .float-medium { animation: float-anim 6s ease-in-out infinite 1s; }
        .float-slow { animation: float-anim 8s ease-in-out infinite 2s; }
        
        @keyframes float-anim {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* 5-MINUTE NEON FLASH ALERT */
        .flash-alert-active {
            animation: neon-strobe 0.8s ease-in-out infinite !important;
            border-color: #fcee0a !important;
            box-shadow: 0 0 30px rgba(252, 238, 10, 0.6), inset 0 0 20px rgba(252, 238, 10, 0.2) !important;
            z-index: 50;
        }

        @keyframes neon-strobe {
            0% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.5); transform: scale(1.02); }
            100% { filter: brightness(1); transform: scale(1); }
        }

        /* MATRIX RECALCULATING EFFECT (DATA HIDE/SHOW) */
        .recalc-wipe-in {
            animation: wipe-in-anim 0.5s ease-out forwards;
        }

        @keyframes wipe-in-anim {
            0% { opacity: 0; filter: blur(10px); transform: translateY(10px); }
            100% { opacity: 1; filter: blur(0px); transform: translateY(0); }
        }

        .glitch-text {
            animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
            text-shadow: 2px 2px #ff003c, -2px -2px #00f0ff;
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-5deg); }
            40% { transform: skew(5deg); }
            60% { transform: skew(-2deg); }
            80% { transform: skew(2deg); }
            100% { transform: skew(0deg); }
        }

        .scanlines::after { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; opacity: 0.35; }
        
        .ticker-wrap { width: 100%; overflow: hidden; background: linear-gradient(90deg, rgba(3,0,20,1) 0%, rgba(10,10,31,0.9) 50%, rgba(3,0,20,1) 100%); border-bottom: 1px solid rgba(0, 240, 255, 0.4); box-shadow: 0 4px 25px rgba(0, 240, 255, 0.2); position: relative; z-index: 40; padding: 10px 0; white-space: nowrap; }
        .ticker-content { display: inline-flex; white-space: nowrap; width: fit-content; }
        .ticker-content:hover { animation-play-state: paused; }
        
        .disconnected-card { border-color: rgba(255, 0, 60, 0.6) !important; background: linear-gradient(135deg, rgba(255, 0, 60, 0.05), rgba(10, 10, 31, 0.8)) !important; box-shadow: 0 0 20px rgba(255,0,60,0.1) !important; filter: grayscale(0.5); }
    </style>
</head>

const ClockIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
const BrainIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"></path><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"></path></svg>;

const GlobeIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>;
const GridIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>;
const ListIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
const CalendarIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;

const MatrixBackground = () => {
    const canvasRef = useRef(null);
    useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ'.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;
        const draw = () => {
            ctx.fillStyle = 'rgba(3, 0, 20, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px Courier New';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillStyle = Math.random() > 0.95 ? '#ff003c' : (Math.random() > 0.8 ? '#bd00ff' : '#00f0ff');
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        };
        const interval = setInterval(draw, 50);
        const handleResize = () => {
            if (canvasRef.current) {
                canvasRef.current.width = window.innerWidth;
                canvasRef.current.height = window.innerHeight;
            }
        };
        window.addEventListener('resize', handleResize);
        return () => { clearInterval(interval); window.removeEventListener('resize', handleResize); };
    }, []);
    return <canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full z-[-2] opacity-[0.35]" />;
};

const LiveSignalFeed = ({ signals, isConnected }) => {
    const [isFlashing, setIsFlashing] = useState(false);

    // 5-Minute Flash Trigger Logic
    useEffect(() => {
        if (!isConnected) return;
        const flashTimer = setInterval(() => {
            setIsFlashing(true);
            // Turn off flash after 6 seconds
            setTimeout(() => {
                setIsFlashing(false);
            }, 6000);
        }, 300000); // 300,000ms = 5 minutes

        return () => clearInterval(flashTimer);
    }, [isConnected]);

    if (!isConnected || !signals || signals.length === 0) return (
        <div className="mt-8 cyber-panel p-4 border-t-2 border-t-cyber-pink disconnected-card float-slow">
            <div className="flex items-center gap-3 mb-2 px-2">
                 <ZapIcon className="text-cyber-pink animate-pulse" />
                 <h2 className="font-display text-lg tracking-[0.1em] text-cyber-pink">LIVE AI SIGNAL FEED</h2>
            </div>
            <div className="p-4 text-center font-mono text-cyber-pink font-bold">DISCONNECTED - AWAITING SERVER STREAM...</div>
        </div>
    );

    return (
        <div className={`mt-8 cyber-panel p-4 float-medium border-t-2 border-t-cyber-yellow transition-all duration-300 ${isFlashing ? 'flash-alert-active scale-[1.02]' : 'shadow-[0_0_15px_rgba(252,238,10,0.15)]'} relative overflow-hidden`}>
            <div className="absolute inset-0 bg-gradient-to-b from-cyber-yellow/10 to-transparent pointer-events-none"></div>
            <div className="flex items-center gap-3 mb-4 border-b border-cyber-yellow/40 pb-2 relative z-10 px-2">
                 <ZapIcon className="text-cyber-yellow animate-pulse" />
                 <h2 className="font-display text-lg tracking-[0.1em] text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]">LIVE AI SIGNAL FEED (DECOUPLED ENGINE)</h2>
                 <span className={`ml-auto text-[10px] font-mono border px-2 py-0.5 tracking-wider ${isFlashing ? 'bg-cyber-yellow text-black font-black border-cyber-yellow animate-pulse' : 'text-cyber-yellow border-cyber-yellow/50 bg-cyber-yellow/10'}`}>
                    {isFlashing ? "NEW SIGNAL DETECTED" : "LIVE SCANNER FEED"}
                 </span>
            </div>
            
            <div className="space-y-3 relative z-10">
                {signals.map((sig, idx) => {
                     const isBuy = sig.dir && sig.dir.includes("BUY");
                     const isSell = sig.dir && sig.dir.includes("SELL");
                     const borderColor = isBuy ? "border-cyber-green" : isSell ? "border-cyber-pink" : "border-gray-400";
                     const textColor = isBuy ? "text-cyber-green drop-shadow-[0_0_10px_rgba(57,255,20,0.9)]" : isSell ? "text-cyber-pink drop-shadow-[0_0_10px_rgba(255,0,60,0.9)]" : "text-gray-400";
                     
                     return (
                    <div key={sig.id || idx} className={`flex flex-wrap items-center justify-between p-3 border-l-4 ${idx === 0 ? 'bg-gray-900/90 shadow-[0_0_25px_rgba(252,238,10,0.2)] animate-pulse-slow scale-[1.01] transition-transform' : 'bg-black/60 opacity-70 hover:opacity-100 hover:bg-black/80 hover:translate-x-1 transition-all'} ${borderColor} rounded-r-sm backdrop-blur-md`}>
                        <div className="flex items-center gap-4 w-1/3">
                            <span className="font-mono text-[10px] text-gray-400 bg-black/80 px-2 py-1 rounded border border-gray-800">{sig.time}</span>
                            <span className="font-display font-black text-xl text-white tracking-widest drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]">{sig.pair}</span>
                            <span className="text-[10px] font-mono font-bold text-cyber-yellow border border-cyber-yellow/30 px-1.5 py-0.5 bg-cyber-yellow/10">{sig.timeframe || "15 MIN"}</span>
                        </div>
                        <div className={`w-1/3 text-center font-display font-black text-2xl tracking-[0.1em] ${textColor}`}>
                            {sig.dir}
                        </div>
                        <div className="w-1/3 text-right font-mono text-sm text-gray-400">
                            ENTRY PRICE <br/><span className="font-bold text-white text-xl tracking-wider drop-shadow-[0_0_5px_rgba(255,255,255,0.4)]">{typeof sig.price === 'number' ? sig.price.toFixed(5) : sig.price}</span>
                        </div>
                    </div>
                )})}
            </div>
        </div>
    );
};

const IndicatorTable = ({ title, data, delay, isConnected }) => {
    if (!isConnected) {
        return (
            <div className="cyber-panel flex flex-col h-full disconnected-card opacity-80 float-fast" style={{ animationDelay: delay }}>
                <div className="px-5 py-3 border-b border-cyber-pink/30 bg-cyber-pink/10 flex justify-between items-center">
                    <h3 className="font-display font-bold text-cyber-pink relative z-10 flex items-center gap-2 text-sm tracking-wider">

                    </h3>
                    <span className="text-[10px] font-mono bg-cyber-darker px-2 py-1 border border-cyber-pink/20 text-cyber-pink">0 VALS</span>
                </div>
                <div className="flex-1 p-4 flex items-center justify-center">
                    <span className="font-mono text-cyber-pink text-xs font-bold">DISCONNECTED - NO DATA</span>
                </div>
            </div>
        );
    }

    return (
        <div className="cyber-panel flex flex-col h-full opacity-0 animate-fade-in-up float-fast" style={{ animationDelay: delay }}>

const formatTimeLeft = (seconds) => {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
};

    const [scanHistory, setScanHistory] = useState([]);

    ]);

    const [cryptoTimeLeft, setCryptoTimeLeft] = useState(3600);
    const [isCoreRefreshing, setIsCoreRefreshing] = useState(false);
    const [isCryptoRefreshing, setIsCryptoRefreshing] = useState(false);

    const API_KEY = "f95a03a9c245412890013ca3a7736bcf";

    // Visual Countdown Clocks
    useEffect(() => {
        const timer = setInterval(() => {
            const now = new Date();
            const min = now.getMinutes();
            const sec = now.getSeconds();
            setTimeLeft(300 - ((min % 5) * 60 + sec));
            setCryptoTimeLeft(3600 - (min * 60 + sec));
        }, 1000);
        return () => clearInterval(timer);
    }, []);

    // REFRESH DATA EFFECTS
    // Triggers a 2-second wipe animation when timer reaches exactly 5 mins (300s)
    useEffect(() => {
        if (timeLeft === 300) {
            setIsCoreRefreshing(true);
            setTimeout(() => setIsCoreRefreshing(false), 2000);
        }

    useEffect(() => {
        if (cryptoTimeLeft === 3600) {

        }

    // ONLY FETCH PRICES FOR TICKER
    useEffect(() => {
        const fetchQuotes = () => {
            fetch(`https://api.twelvedata.com/quote?symbol=EUR/USD,GBP/USD,USD/JPY,AUD/USD,BTC/USD&apikey=${API_KEY}`)
            .then(res => res.json())
            .then(data => {
                if (data) {
                    const newQuotes = {};
                    Object.keys(data).forEach(s => {
                        if(data[s] && data[s].close) newQuotes[s] = { price: parseFloat(data[s].close), change: parseFloat(data[s].percent_change) };
                    });
                    setTickerQuotes(prev => ({ ...prev, ...newQuotes }));
                }
            }).catch(e => {});
        };
        fetchQuotes();
        const quoteInterval = setInterval(fetchQuotes, 60000); // Update ticker every minute
        return () => clearInterval(quoteInterval);
    }, []);

    // STRICT WEBSOCKET ENGINE
    useEffect(() => {
        let socket;
        const connectToCore = () => {
            try {
                socket = new WebSocket("ws://localhost:8765");
                socket.onopen = () => {
                    setIsConnected(true);
                    setTerminalLogs(prev => [...prev, { id: Date.now(), msg: "[NET] Connected to DDY Server Engine. Receiving LIVE Data." }]);
                };
                socket.onmessage = (event) => {
                    try {
                        const payload = JSON.parse(event.data);
                        if (payload.type === "core1") setCurrentPrediction(payload.data);
                        if (payload.type === "core2") setNeuralPrediction(payload.data);
                        if (payload.type === "core3") setCryptoPrediction(payload.data);
                        
                        if (payload.type === "scanner") {
                            setScannerFeed(prev => [payload.data, ...prev].slice(0, 8));
                        }
                        if (payload.type === "osc_data") setOscillatorsData(payload.data);
                        if (payload.type === "ma_data") setMaData(payload.data);
                        
                        if (payload.type === "history_c1") setC1History(prev => [payload.data, ...prev].slice(0, 10));
                        if (payload.type === "history_c2") setC2History(prev => [payload.data, ...prev].slice(0, 10));
                        if (payload.type === "history_c3") setC3History(prev => [payload.data, ...prev].slice(0, 10));
                        if (payload.type === "history_scan") setScanHistory(prev => [payload.data, ...prev].slice(0, 10));

                        if (payload.type === "log") {
                            setTerminalLogs(prev => [...prev.slice(-40), { id: Date.now() + Math.random(), msg: payload.msg }]);
                            if(terminalRef.current) terminalRef.current.scrollTop = terminalRef.current.scrollHeight;
                        }
                    } catch(e) {}
                };
                socket.onclose = () => {
                    setIsConnected(false);

                    setCryptoPrediction(defaultDisconnect);
