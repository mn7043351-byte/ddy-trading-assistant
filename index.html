const Speedometer = ({ value, label, delay }) => {
    const clampedValue = Math.max(0, Math.min(100, value));
    const angle = (clampedValue / 100) * 180 - 90;
    
    let statusText = "NEUTRAL";
    let colorClass = "text-gray-500";
    let activeStroke = "#4b5563"; // neutral
    
    if(clampedValue <= 20) { statusText = "STRONG SELL"; colorClass = "text-cyber-pink animate-pulse"; activeStroke = "#ff003c"; }
    else if(clampedValue <= 40) { statusText = "SELL"; colorClass = "text-red-500"; activeStroke = "#ef4444"; }
    else if(clampedValue >= 80) { statusText = "STRONG BUY"; colorClass = "text-cyber-cyan animate-pulse"; activeStroke = "#00f0ff"; }
    else if(clampedValue >= 60) { statusText = "BUY"; colorClass = "text-blue-500"; activeStroke = "#3b82f6"; }

    return (
        <div 
            className="flex flex-col items-center justify-center p-5 cyber-panel w-full transform transition-all duration-300 hover:scale-[1.02] hover:shadow-[0_0_15px_rgba(0,240,255,0.3)] opacity-0 animate-fade-in-up"
            style={{ animationDelay: delay }}
        >
            <h3 className="text-xs font-display font-bold text-cyber-yellow mb-3 tracking-[0.2em]">{label}</h3>
            <svg width="140" height="80" viewBox="0 0 120 70" className="relative z-10 drop-shadow-[0_0_10px_rgba(0,240,255,0.2)]">
                {/* Background Arc */}
                <path d="M 10 60 A 50 50 0 0 1 110 60" fill="none" stroke="#111" strokeWidth="8" strokeLinecap="square" />
                
                {/* Colored Arcs */}
                <path d="M 10 60 A 50 50 0 0 1 24.6 24.6" fill="none" stroke="#ff003c" strokeWidth="8" strokeLinecap="square" className="transition-all duration-500" />
                <path d="M 24.6 24.6 A 50 50 0 0 1 50 11.2" fill="none" stroke="#990033" strokeWidth="8" className="transition-all duration-500" />
                <path d="M 50 11.2 A 50 50 0 0 1 70 11.2" fill="none" stroke="#333" strokeWidth="8" className="transition-all duration-500" />
                <path d="M 70 11.2 A 50 50 0 0 1 95.4 24.6" fill="none" stroke="#0088aa" strokeWidth="8" className="transition-all duration-500" />
                <path d="M 95.4 24.6 A 50 50 0 0 1 110 60" fill="none" stroke="#00f0ff" strokeWidth="8" strokeLinecap="square" className="transition-all duration-500" />
                
                {/* Active Indicator Arc Overlay (Glow) */}
                <path d="M 10 60 A 50 50 0 0 1 110 60" fill="none" stroke={activeStroke} strokeWidth="8" strokeLinecap="square" className="opacity-80 mix-blend-screen" style={{clipPath: `inset(0 ${100 - clampedValue}% 0 0)`}}/>

                {/* Cyber Needle */}
                <g transform={`translate(60, 60) rotate(${angle})`} style={{ transition: 'transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
                    <polygon points="-2,-45 2,-45 4,0 -4,0" fill="#fcee0a" className="drop-shadow-[0_0_5px_rgba(252,238,10,0.8)]" />
                    <rect x="-4" y="-4" width="8" height="8" fill="#fcee0a" />
                    <rect x="-2" y="-2" width="4" height="4" fill="#000" />
                </g>
            </svg>
            <div className={`mt-3 font-display font-bold text-lg transition-colors duration-500 ${colorClass} drop-shadow-md`}>{statusText}</div>
        </div>
    );
};

const IndicatorTable = ({ title, data, delay }) => (

        className="cyber-panel flex flex-col h-full opacity-0 animate-fade-in-up transition-all duration-300 hover:shadow-[0_0_20px_rgba(0,240,255,0.15)]"
        style={{ animationDelay: delay }}
    >
        <div className="px-5 py-3 border-b border-cyber-cyan/30 bg-cyber-dark flex justify-between items-center relative overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-r from-cyber-cyan/10 to-transparent animate-pulse-slow pointer-events-none"></div>
            <h3 className="font-display font-bold text-gray-200 relative z-10 flex items-center gap-2 text-sm tracking-wider">
                <span className="w-2 h-4 bg-cyber-cyan"></span>
                {title}
            </h3>
            <span className="text-[10px] font-mono bg-cyber-darker px-2 py-1 border border-cyber-cyan/20 text-cyber-cyan relative z-10">{data.length} VALS</span>
        </div>
        <div className="overflow-x-auto flex-1 p-2">
            <table className="w-full text-sm text-left text-gray-400">
                <thead className="text-[10px] text-cyber-yellow tracking-[0.2em] font-display bg-transparent border-b border-cyber-yellow/20">
                    <tr>
                        <th className="px-4 py-2 font-medium">SYS_NAME</th>
                        <th className="px-4 py-2 font-medium text-right">METRIC</th>
                        <th className="px-4 py-2 font-medium text-right">STATE</th>

                <tbody className="divide-y divide-gray-800/50">
                    {data.map((row, i) => {

                        if (row.action.includes("Sell")) actionColor = "text-cyber-pink drop-shadow-[0_0_5px_rgba(255,0,60,0.8)]";
                        
                        return (

);

// MAIN APP COMPONENT
// -------------------------------------------------------------

const App = () => {
    const [activeTab, setActiveTab] = useState("dashboard");
    
    // REAL LIVE DATA STATE (TWELVE DATA - PURE FOREX)
    const [realData, setRealData] = useState({
        price: 0,
        openPrice: 0,
        sma10: 0,
        sma20: 0,
        sma50: 0,
        rsi14: 50,
        isGreenCandle: true,
        momentum: 0
    });
    
    const API_KEY = "9f08b18e57af42349b92c1d5e67f8e92";
    
    useEffect(() => {
        // Fetch Historical 5m Candles from Twelve Data
        fetch(`https://api.twelvedata.com/time_series?symbol=EUR/USD&interval=5min&outputsize=60&apikey=${API_KEY}`)
        .then(res => res.json())
        .then(data => {
            if (!data || !data.values) return;
            const candles = data.values.reverse();
            const closes = candles.map(d => parseFloat(d.close));
            const currentCandle = candles[candles.length - 1];
            const currentOpen = parseFloat(currentCandle.open);
            const currentPrice = parseFloat(currentCandle.close);
            
            const calcSMA = (period) => {
                if (closes.length < period) return 0;
                const slice = closes.slice(-period);
                return slice.reduce((a, b) => a + b, 0) / period;
            };
            
            let gains = 0, losses = 0;
            for(let i = Math.max(0, closes.length - 15); i < closes.length - 1; i++) {
                const diff = closes[i+1] - closes[i];
                if (diff >= 0) gains += diff;
                else losses -= diff;
            }
            const avgGain = gains / 14;
            const avgLoss = losses / 14;
            const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
            const rsi = 100 - (100 / (1 + rs));

            setRealData(prev => ({
                ...prev,
                sma10: calcSMA(10),
                sma20: calcSMA(20),
                sma50: calcSMA(50),
                rsi14: rsi || 50,
                price: currentPrice,
                openPrice: currentOpen,
                isGreenCandle: currentPrice >= currentOpen,
                momentum: currentPrice - currentOpen
            }));
        })
        .catch(err => console.error("Error fetching REST API:", err));

        // Connect to Twelve Data WebSocket for Live Tick Data
        const ws = new WebSocket(`wss://ws.twelvedata.com/v1/quotes/price?apikey=${API_KEY}`);
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                "action": "subscribe",
                "params": {
                    "symbols": "EUR/USD"
                }
            }));
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.event === "price" && msg.price) {
                const current = parseFloat(msg.price);
                setRealData(prev => {
                    const open = prev.openPrice !== 0 ? prev.openPrice : current;
                    return {
                        ...prev,
                        price: current,
                        isGreenCandle: current >= open,
                        momentum: current - open
                    };
                });
            }
        };
        return () => ws.close();
    }, []);

    const [currentPrediction, setCurrentPrediction] = useState({
        direction: "WAIT",
        confidence: 0,
        logic: "Initializing Live Forex Matrix...",
        timestamp: new Date()
    });

    const [history, setHistory] = useState([]);
    const [timeLeft, setTimeLeft] = useState(300);
    const terminalRef = useRef(null);
    const [terminalLogs, setTerminalLogs] = useState([
        { id: 1, msg: "[SYS] DDY Trading Core Activated..." },
        { id: 2, msg: "[API] Connected to TwelveData REST API for Pure Forex Klines." },
        { id: 3, msg: "[WS] Live EUR/USD tick WebSocket stream active." }
    ]);

    // Instantly react to Live Candle changes
    useEffect(() => {
        if (realData.price === 0) return;
        
        const isBuy = realData.isGreenCandle;
        const conf = Math.min(99, Math.floor(65 + (Math.abs(realData.momentum) * 10000)));
        
        setCurrentPrediction(prev => {
            const newDir = isBuy ? "BUY" : "SELL";
            if (prev.direction !== newDir || Math.abs(prev.confidence - conf) > 2) {
                return {
                    ...prev,
                    direction: newDir,
                    confidence: conf,
                    logic: isBuy ? "Pure Forex Analysis: Bullish pressure detected. Price > Open." : "Pure Forex Analysis: Bearish pressure detected. Price < Open.",
                    timestamp: new Date()
                };
            }
            return prev;
        });
    }, [realData.isGreenCandle, realData.momentum, realData.price]);

    // Timer Effect for 5m interval resets
    useEffect(() => {
        const timer = setInterval(() => {
            setTimeLeft(prev => {
                if (prev <= 1) {
                    setHistory(h => {
                        const newH = [...h, {
                            id: Date.now(),
                            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                            pair: "EUR/USD",
                            dir: currentPrediction.direction,
                            conf: currentPrediction.confidence,
                            result: currentPrediction.direction === (realData.isGreenCandle ? "BUY" : "SELL") ? "Win" : "Loss"
                        }];
                        return newH.slice(-15);
                    });
                    return 300;
                }
                return prev - 1;
            });
        }, 1000);
        return () => clearInterval(timer);
    }, [currentPrediction, realData.isGreenCandle]);

    useEffect(() => {
        if (terminalRef.current) {
            terminalRef.current.scrollTo({
                top: terminalRef.current.scrollHeight,
                behavior: 'smooth'
            });
        }
    }, [terminalLogs]);

    const totalSignals = history.length;
    const wins = history.filter(h => h.result === "Win").length;
    const winRate = totalSignals > 0 ? Math.round((wins / totalSignals) * 100) : 0;

    const oscillatorsData = [
        { name: "Relative Strength Index (14)", value: realData.rsi14.toFixed(2), action: realData.rsi14 > 70 ? "Sell" : realData.rsi14 < 30 ? "Buy" : "Neutral" },
        { name: "Current Price Delta", value: realData.momentum.toFixed(5), action: realData.momentum >= 0 ? "Buy" : "Sell" },
    ];

    const maData = [
        { name: "Simple Moving Average (10)", value: realData.sma10.toFixed(5), action: realData.price > realData.sma10 ? "Buy" : "Sell" },
        { name: "Simple Moving Average (20)", value: realData.sma20.toFixed(5), action: realData.price > realData.sma20 ? "Buy" : "Sell" },
        { name: "Simple Moving Average (50)", value: realData.sma50.toFixed(5), action: realData.price > realData.sma50 ? "Buy" : "Sell" },
    ];

    const gauges = {
        oscillators: realData.rsi14,
        movingAverages: realData.price > realData.sma20 ? 80 : 20,
        summary: ((realData.rsi14) + (realData.price > realData.sma20 ? 80 : 20)) / 2
    };

    const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    return (
        <div className="max-w-7xl mx-auto p-4 lg:p-6 space-y-6">
            
            {/* Header / Navbar */}
            <header className="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-cyber-cyan/30 pb-4 mb-8">
                <div className="flex items-center gap-3">
                    <div className="p-2 bg-cyber-cyan/10 rounded-lg border border-cyber-cyan/50 shadow-[0_0_15px_rgba(0,240,255,0.2)]">
                        <ZapIcon className="text-cyber-cyan animate-pulse" />
                    </div>
                    <div>
                        <h1 className="text-2xl font-display font-black text-white tracking-widest drop-shadow-[0_0_5px_rgba(255,255,255,0.8)] uppercase">
                            DDY<span className="text-cyber-cyan">.AI</span>
                        </h1>
                        <p className="text-[10px] font-mono text-cyber-yellow font-bold tracking-[0.3em] uppercase mt-0.5">Pred-Engine v3.0 // FOREX</p>
                    </div>
                </div>
                
                <div className="flex gap-2 font-display text-sm tracking-wider">
                    <button onClick={() => setActiveTab("dashboard")} className={`px-6 py-2 rounded-sm border transition-all duration-300 ${activeTab === 'dashboard' ? 'bg-cyber-cyan/20 border-cyber-cyan text-cyber-cyan shadow-[0_0_10px_rgba(0,240,255,0.3)]' : 'bg-transparent border-gray-700 text-gray-500 hover:border-cyber-cyan/50 hover:text-gray-300'} flex items-center gap-2`}>
                        <ActivityIcon className="w-4 h-4" /> DASHBOARD
                    </button>
                    <button onClick={() => setActiveTab("training")} className={`px-6 py-2 rounded-sm border transition-all duration-300 ${activeTab === 'training' ? 'bg-cyber-cyan/20 border-cyber-cyan text-cyber-cyan shadow-[0_0_10px_rgba(0,240,255,0.3)]' : 'bg-transparent border-gray-700 text-gray-500 hover:border-cyber-cyan/50 hover:text-gray-300'} flex items-center gap-2`}>
                        <BrainIcon className="w-4 h-4" /> TRAINING CORE
                    </button>
                </div>
            </header>

            {activeTab === "dashboard" ? (
                <div className="space-y-6">
                    {/* Top Row: Speedometers */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Speedometer value={gauges.oscillators} label="OSCILLATORS" delay="0s" />
                        <Speedometer value={gauges.summary} label="SUMMARY" delay="0.1s" />
                        <Speedometer value={gauges.movingAverages} label="MOVING AVGS" delay="0.2s" />
                    </div>

                    {/* Middle Row: AI Signal & TradingView */}
                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
                        
                        {/* TradingView Chart */}
                        <div className="xl:col-span-8 animate-fade-in-up" style={{ animationDelay: '0.3s' }}>
                            <div className="flex items-center gap-2 mb-3">
                                <TrendingUpIcon className="text-cyber-cyan" />
                                <h2 className="font-display text-lg tracking-[0.1em] text-gray-200">MARKET MATRIX</h2>
                                <div className="ml-auto flex items-center gap-2">
                                    <span className="relative flex h-2 w-2">
                                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyber-green opacity-75"></span>
                                      <span className="relative inline-flex rounded-full h-2 w-2 bg-cyber-green"></span>
                                    </span>
                                    <span className="text-[10px] font-mono text-cyber-green border border-cyber-green/30 bg-cyber-green/10 px-2 py-0.5 tracking-wider">DATALINK ACTIVE</span>
                                </div>
                            </div>
                            <TradingViewWidget />
                        </div>

                        {/* AI Prediction Card */}
                        <div className="xl:col-span-4 flex flex-col gap-4 animate-fade-in-up" style={{ animationDelay: '0.4s' }}>
                            <div className="flex items-center gap-2 mb-1">
                                <BrainIcon className="text-cyber-cyan animate-pulse-slow" />
                                <h2 className="font-display text-lg tracking-[0.1em] text-gray-200">NEXT VECTOR PREDICTION</h2>
                            </div>
                            
                            <div className={`flex-1 cyber-panel p-6 flex flex-col justify-between relative overflow-hidden transition-all duration-700 ${currentPrediction.direction === 'BUY' ? 'glow-card-buy' : currentPrediction.direction === 'SELL' ? 'glow-card-sell' : 'border-gray-500'}`}>
                                
                                <div className="flex justify-between items-start z-10 relative">
                                    <div>
                                        <p className="text-[10px] font-mono text-gray-400 tracking-[0.2em] uppercase mb-1">Target Vector</p>
                                        <div className="flex items-center gap-3">
                                            <h1 className={`text-6xl font-display font-black tracking-widest uppercase ${currentPrediction.direction === 'BUY' ? 'text-cyber-cyan drop-shadow-[0_0_10px_rgba(0,240,255,0.8)]' : currentPrediction.direction === 'SELL' ? 'text-cyber-pink drop-shadow-[0_0_10px_rgba(255,0,60,0.8)]' : 'text-gray-500'}`}>
                                                {currentPrediction.direction}
                                            </h1>
                                            {currentPrediction.direction === 'BUY' && (
                                                <div className="p-2 bg-cyber-cyan/10 rounded-md border border-cyber-cyan text-cyber-cyan shadow-[0_0_10px_rgba(0,240,255,0.4)] animate-bounce">
                                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="square"><polyline points="18 15 12 9 6 15"></polyline></svg>
                                                </div>
                                            )}
                                            {currentPrediction.direction === 'SELL' && (
                                                <div className="p-2 bg-cyber-pink/10 rounded-md border border-cyber-pink text-cyber-pink shadow-[0_0_10px_rgba(255,0,60,0.4)] animate-bounce" style={{animationDirection: 'reverse'}}>
                                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="square"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] font-mono text-gray-400 tracking-[0.2em] uppercase mb-1">Probability</p>
                                        <div className="text-3xl font-display font-bold text-cyber-yellow drop-shadow-[0_0_8px_rgba(252,238,10,0.6)]">
                                            {currentPrediction.confidence}%
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-8 mb-6 p-4 bg-cyber-darker border-l-2 border-cyber-cyan relative z-10 font-mono text-sm text-gray-300 shadow-inner">
                                    <div className="flex items-center gap-2 mb-2 text-cyber-cyan">
                                        <ActivityIcon className="w-4 h-4" />
                                        <span className="text-[10px] tracking-[0.2em] font-bold uppercase">Logic Execution</span>
                                    </div>
                                    <p className="leading-relaxed typewriter-text">{currentPrediction.logic}</p>
                                </div>
                                
                                <div className="pt-4 border-t border-gray-800 flex justify-between items-center relative z-10 mt-auto">
                                    <div className="flex items-center gap-2 text-gray-400 text-xs font-display tracking-widest">
                                        <ClockIcon className="w-4 h-4" />
                                        TIME TO EXECUTION
                                    </div>
                                    <div className="font-mono text-2xl font-bold tracking-widest text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]">
                                        {formatTime(timeLeft)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Bottom Row: Tables */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-10">
                        <IndicatorTable title="OSC DATA" data={oscillatorsData} delay="0.5s" />
                        <IndicatorTable title="MA DATA" data={maData} delay="0.6s" />
                    </div>
                </div>
            ) : (
                /* TRAINING CORE TAB */
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in-up">
                    
                    {/* Left Col: Terminal */}
                    <div className="lg:col-span-2 cyber-panel p-0 flex flex-col h-[600px] border border-cyber-purple/30">
                        <div className="px-4 py-3 bg-cyber-darker border-b border-cyber-purple/30 flex items-center gap-2">
                            <div className="flex gap-1.5">
                                <div className="w-3 h-3 rounded-full bg-cyber-pink"></div>
                                <div className="w-3 h-3 rounded-full bg-cyber-yellow"></div>
                                <div className="w-3 h-3 rounded-full bg-cyber-green"></div>
                            </div>
                            <span className="ml-4 font-mono text-xs text-cyber-purple tracking-[0.2em]">root@ddy:~# ./training_module.sh</span>
                        </div>
                        <div 
                            ref={terminalRef}
                            className="flex-1 p-4 font-mono text-[13px] text-gray-300 leading-relaxed overflow-y-auto terminal-scroll bg-[#050505]"
                        >
                            {terminalLogs.map(log => (
                                <div key={log.id} className="mb-1 opacity-0 animate-fade-in">
                                    <span className="text-gray-500 mr-2">></span>
                                    <span dangerouslySetInnerHTML={{__html: log.msg.replace(/\[(.*?)\]/g, '<span class="text-cyber-cyan">[$1]</span>')}}></span>
                                </div>
                            ))}
                            <div className="animate-pulse text-cyber-cyan mt-2">_</div>
                        </div>
                    </div>

                    {/* Right Col: Stats */}
                    <div className="flex flex-col gap-6">
                        <div className="cyber-panel p-6 shadow-[0_0_15px_rgba(189,0,255,0.15)] border-cyber-purple/30">
                            <h3 className="font-display font-bold text-gray-200 text-sm tracking-wider mb-6 border-b border-cyber-purple/30 pb-2">PERFORMANCE MATRIX</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="p-4 bg-cyber-darker border border-gray-800 text-center">
                                    <div className="text-[10px] font-mono text-gray-500 mb-1 tracking-widest">TOTAL</div>
                                    <div className="text-2xl font-display font-black text-white">{totalSignals}</div>
                                </div>
                                <div className="p-4 bg-cyber-darker border border-gray-800 text-center">
                                    <div className="text-[10px] font-mono text-gray-500 mb-1 tracking-widest">WIN RATE</div>
                                    <div className="text-2xl font-display font-black text-cyber-green drop-shadow-[0_0_5px_rgba(57,255,20,0.5)]">{winRate}%</div>
                                </div>
                            </div>
                        </div>

                        <div className="cyber-panel flex-1 flex flex-col overflow-hidden border-cyber-purple/30">
                            <h3 className="font-display font-bold text-gray-200 text-sm tracking-wider px-5 py-4 border-b border-cyber-purple/30 bg-cyber-darker">SIGNAL HISTORY</h3>
                            <div className="flex-1 overflow-y-auto terminal-scroll p-2">
                                <table className="w-full text-sm text-left">
                                    <tbody className="divide-y divide-gray-800/50">
                                        {history.map((h, i) => (
                                            <tr key={i} className="font-mono text-xs hover:bg-cyber-purple/10">
                                                <td className="px-4 py-2 text-gray-500">{h.time}</td>
                                                <td className={`px-4 py-2 font-bold ${h.dir === 'BUY' ? 'text-cyber-cyan' : 'text-cyber-pink'}`}>{h.dir}</td>
                                                <td className="px-4 py-2 text-cyber-yellow">{h.conf}%</td>
                                                <td className="px-4 py-2 text-right">
                                                    {h.result === "Win" ? 
                                                        <span className="text-cyber-green border border-cyber-green/50 px-2 py-0.5">VALID</span> : 
                                                        <span className="text-cyber-pink border border-cyber-pink/50 px-2 py-0.5">INVALID</span>
                                                    }
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
