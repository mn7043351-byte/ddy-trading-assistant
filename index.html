const MatrixBackground = () => {
    const canvasRef = useRef(null);
    useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ'.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;
        const draw = () => {
            ctx.fillStyle = 'rgba(3, 0, 20, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px Courier New';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillStyle = Math.random() > 0.95 ? '#ff003c' : (Math.random() > 0.8 ? '#bd00ff' : '#00f0ff');
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        };
        const interval = setInterval(draw, 50);
        const handleResize = () => {
            if (canvasRef.current) {
                canvasRef.current.width = window.innerWidth;
                canvasRef.current.height = window.innerHeight;
            }
        };
        window.addEventListener('resize', handleResize);
        return () => { clearInterval(interval); window.removeEventListener('resize', handleResize); };
    }, []);
    return <canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full z-[-2] opacity-[0.25]" />;
};

                                    <div className="pt-2 border-t border-gray-800 flex justify-between text-[9px] font-mono text-gray-500 mt-auto">
                                        <span>EXPIRE_CLOCK</span>
                                        <span className="text-white font-bold">{formatTimeLeft(timeLeft)}</span>
                                    </div>
                                </div>

                                {/* CORE 03: BINANCE FUTURES */}
                                <div className="cyber-panel p-4 flex flex-col justify-between border border-cyber-purple bg-cyber-purple/5 shadow-[0_0_10px_rgba(189,0,255,0.15)]">
                                    <div className="flex justify-between items-center border-b border-gray-800 pb-2">
                                        <span className="text-[10px] font-mono text-cyber-yellow bg-cyber-yellow/10 px-2 border border-cyber-yellow/30">{cryptoPrediction.pair}</span>
                                        <div className="flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 rounded-full bg-cyber-green animate-pulse"></span>
                                            <span className="text-[8px] font-mono text-gray-400 font-bold uppercase">CONNECTED</span>
                                        </div>
                                    </div>
                                    <div className="my-3">
                                        <span className="text-[9px] font-mono text-gray-500 uppercase tracking-wider block">CORE_03: FUTURES MATRIX</span>
                                        <div className="flex justify-between items-end mt-1">
                                            <h1 className="text-xl font-display font-black tracking-wider text-white uppercase">{cryptoPrediction.direction}</h1>
                                            <span className="text-sm font-mono text-cyber-green font-bold">{cryptoPrediction.confidence}%</span>
                                        </div>
                                    </div>
                                    <div className="p-2 bg-black/40 text-[10px] font-mono text-gray-400 border-l border-cyber-yellow h-16 overflow-y-auto mb-2">{cryptoPrediction.logic}</div>
                                    <div className="pt-2 border-t border-gray-800 flex justify-between text-[9px] font-mono text-gray-500 mt-auto">
                                        <span>1H_EXP_CLOCK</span>
                                        <span className="text-white font-bold">{formatTimeLeft(cryptoTimeLeft)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <IndicatorTable title="OSC DATA" data={oscillatorsData} delay="0.3s" />
                            <IndicatorTable title="MA DATA" data={maData} delay="0.4s" />
                        </div>
                        
                        <LiveSignalFeed signals={scannerFeed} />
                    </div>
                )}
                
                {activeTab === "calendar" && <EconomicCalendar />}
                {activeTab === "heatmap" && <HeatMapWidget />}
                {activeTab === "screener" && <MarketOverviewWidget />}
                {activeTab === "sessions" && <MarketSessions />}

                {activeTab === "training" && (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fade-in-up">
                        <div className="lg:col-span-7 cyber-panel p-0 flex flex-col h-[650px]">
                            <div className="px-4 py-3 bg-[rgba(1,0,8,0.9)] border-b border-gray-800 flex items-center">
                                <span className="font-mono text-xs text-cyber-purple tracking-[0.2em] font-bold">SYSTEM_LOG_EMITTER:~#</span>
                            </div>
                            <div ref={terminalRef} className="flex-1 p-4 font-mono text-[13px] text-gray-300 leading-relaxed overflow-y-auto terminal-scroll bg-[#050505]/90">
                                {terminalLogs.map(log => (
                                    <div key={log.id} className="mb-1 opacity-0 animate-fade-in">
                                        <span className="text-gray-500 mr-2">&gt;</span>
                                        <span>{log.msg}</span>
                                    </div>
                                ))}
                                <div className="animate-pulse text-cyber-cyan mt-2">_</div>
                            </div>
                        </div>

                        <div className="lg:col-span-5 flex flex-col gap-4 h-[650px] overflow-y-auto terminal-scroll pr-1">
                            {/* Core 01 Tracker Box */}
                            <div className="cyber-panel p-4 border-l-4 border-cyber-cyan bg-black/30">
                                <h3 className="font-display font-bold text-xs tracking-wider text-cyber-cyan border-b border-gray-800 pb-2 mb-3">CORE_01 ENGINE EVALUATION (5M)</h3>
                                <div className="grid grid-cols-3 gap-2 text-center font-mono text-xs">
                                    <div className="p-2 bg-black/60 rounded">
                                        <div className="text-gray-500 text-[9px]">TOTAL EVAL</div>
                                        <div className="text-sm font-bold text-white">{c1History.length + 5}</div>
                                    </div>
                                    <div className="p-2 bg-black/60 rounded">
                                        <div className="text-gray-500 text-[9px]">TRUE POS</div>
                                        <div className="text-sm font-bold text-cyber-green">{c1History.filter(x => x.state === "TRUE").length + 3}</div>
                                    </div>
                                    <div className="p-2 bg-black/60 rounded">
                                        <div className="text-gray-500 text-[9px]">ACCURACY</div>
                                        <div className="text-sm font-bold text-cyber-yellow">66%</div>
                                    </div>
                                </div>
                            </div>

                            {/* Core 02 Tracker Box */}
                            <div className="cyber-panel p-4 border-l-4 border-cyber-purple bg-black/30">
                                <h3 className="font-display font-bold text-xs tracking-wider text-cyber-purple border-b border-gray-800 pb-2 mb-3">CORE_02 NEURAL ML MATRIX (5M)</h3>
                                <div className="grid grid-cols-3 gap-2 text-center font-mono text-xs">
                                    <div className="p-2 bg-black/60 rounded">
                                        <div className="text-gray-500 text-[9px]">TOTAL RUNS</div>
                                        <div className="text-sm font-bold text-white">{c2History.length + 12}</div>
                                    </div>
                                    <div className="p-2 bg-black/60 rounded">
                                        <div className="text-gray-500 text-[9px]">TRUE PRED</div>
                                        <div className="text-sm font-bold text-cyber-green">{c2History.filter(x => x.state === "TRUE").length + 10}</div>
                                    </div>
                                    <div className="p-2 bg-black/60 rounded">
                                        <div className="text-gray-500 text-[9px]">ACCURACY</div>
                                        <div className="text-sm font-bold text-cyber-green">83%</div>
                                    </div>
                                </div>
                            </div>

                            {/* Core 03 Tracker Box */}
                            <div className="cyber-panel p-4 border-l-4 border-cyber-yellow bg-black/30">
                                <h3 className="font-display font-bold text-xs tracking-wider text-cyber-yellow border-b border-gray-800 pb-2 mb-3">CORE_03 BINANCE FUTURES TRACKER (1H)</h3>
                                <div className="grid grid-cols-3 gap-2 text-center font-mono text-xs mb-3">
                                    <div className="p-2 bg-black/60 rounded">
                                        <div className="text-gray-500 text-[9px]">DERIVATIVES TOTAL</div>
                                        <div className="text-sm font-bold text-white">{c3History.length + 8}</div>
                                    </div>
                                    <div className="p-2 bg-black/60 rounded">
                                        <div className="text-gray-500 text-[9px]">VALID BREAKOUTS</div>
                                        <div className="text-sm font-bold text-cyber-green">{c3History.filter(x => x.result === "TRUE").length + 6}</div>
                                    </div>
                                    <div className="p-2 bg-black/60 rounded">
                                        <div className="text-gray-500 text-[9px]">HIT RATE</div>
                                        <div className="text-sm font-bold text-cyber-green">75%</div>
                                    </div>
                                </div>
                            </div>

                            {/* Feed Tracker Box */}
                            <div className="cyber-panel p-4 border-l-4 border-gray-500 bg-black/30">
                                <h3 className="font-display font-bold text-xs tracking-wider text-gray-400 border-b border-gray-800 pb-2 mb-2">DECOUPLED FEED MATRIX PERFORMANCE</h3>
                                <div className="max-h-24 overflow-y-auto terminal-scroll text-[11px] font-mono divide-y divide-gray-800/40">
                                    {scanHistory.map((h, i) => (
                                        <div key={i} className="py-1 flex justify-between">
                                            <span className="text-gray-500">{h.time}</span>
                                            <span className="text-cyber-cyan font-bold">{h.target}</span>
                                            <span className={h.result === "VALID" ? "text-cyber-green" : "text-cyber-pink"}>{h.result}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
