<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDY Trading Assistant</title>
    
    <!-- Cyberpunk Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                        mono: ['Courier New', 'monospace'],
                    },
                    colors: {
                        cyber: {
                            dark: '#030014',
                            darker: '#010008',
                            panel: '#0a0a1f',
                            cyan: '#00f0ff',
                            pink: '#ff003c',
                            purple: '#bd00ff',
                            yellow: '#fcee0a',
                            green: '#39ff14'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-in-right': 'slideInRight 0.5s ease-out forwards',
                        'slide-in-left': 'slideInLeft 0.5s ease-out forwards',
                        'float': 'float 4s ease-in-out infinite',
                        'glow-pulse-cyan': 'glowPulseCyan 2s ease-in-out infinite alternate',
                        'glow-pulse-pink': 'glowPulsePink 2s ease-in-out infinite alternate',
                        'spin-slow': 'spin 4s linear infinite',
                        'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
                        'glitch': 'glitch 1s linear infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideInRight: {
                            '0%': { opacity: '0', transform: 'translateX(-30px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        slideInLeft: {
                            '0%': { opacity: '0', transform: 'translateX(30px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-6px)' },
                        },
                        glowPulseCyan: {
                            '0%': { filter: 'drop-shadow(0 0 5px rgba(0, 240, 255, 0.5))' },
                            '100%': { filter: 'drop-shadow(0 0 20px rgba(0, 240, 255, 1))' },
                        },
                        glowPulsePink: {
                            '0%': { filter: 'drop-shadow(0 0 5px rgba(255, 0, 60, 0.5))' },
                            '100%': { filter: 'drop-shadow(0 0 20px rgba(255, 0, 60, 1))' },
                        },
                        glitch: {
                            '2%, 64%': { transform: 'translate(2px,0) skew(0deg)' },
                            '4%, 60%': { transform: 'translate(-2px,0) skew(0deg)' },
                            '62%': { transform: 'translate(0,0) skew(5deg)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background-color: #030014;
            color: #e2e8f0;

            padding: 0;
            overflow-x: hidden;
            /* Cyber grid background */

                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),

        }
        
        h1, h2, h3, h4, .font-display {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.05em;
        }
        
        .terminal-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-scroll::-webkit-scrollbar-track {
            background: rgba(0, 240, 255, 0.05);
        }
        .terminal-scroll::-webkit-scrollbar-thumb {
            background-color: #00f0ff;
        }
        
        /* Cyberpunk Glowing card effect */
        .glow-card-buy {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.2);
            border: 2px solid rgba(0, 240, 255, 0.6);
        }
        .glow-card-sell {
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.3), inset 0 0 10px rgba(255, 0, 60, 0.2);
            border: 2px solid rgba(255, 0, 60, 0.6);
        }
        
        /* Cyberpunk styling for panels */
        .cyber-panel {
            background-color: rgba(10, 10, 31, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }
        
        /* Scanline effect */
        .scanlines {
            position: relative;
        }
        .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="dark antialiased min-h-screen scanlines">

    <!-- Application Script -->
    <script type="text/babel">
const { useState, useEffect, useRef } = React;

// -------------------------------------------------------------
// ICONS (Inline SVGs)
// -------------------------------------------------------------
const ActivityIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
const ClockIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
const BrainIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"></path><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"></path><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"></path><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"></path><path d="M6.002 6.5A3 3 0 0 1 5.603 5.125"></path><path d="M11.5 22a1 1 0 0 1-1-1v-1a1 1 0 0 1 1-1"></path><path d="M12.5 22a1 1 0 0 0 1-1v-1a1 1 0 0 0-1-1"></path></svg>;
const TrendingUpIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>;
const ZapIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
const CrosshairIcon = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>;

// -------------------------------------------------------------
// COMPONENTS
// -------------------------------------------------------------

const TradingViewWidget = () => {

        container.current.innerHTML = '';
        const script = document.createElement("script");
        script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
        script.type = "text/javascript";

        script.innerHTML = `

            "enable_publishing": false,

            "gridColor": "rgba(0, 240, 255, 0.1)",

                <div className="tradingview-widget-container__widget" style={{ height: "100%", width: "100%" }}></div>
            </div>
        </div>

};

const Speedometer = ({ value, label, delay }) => {
    const clampedValue = Math.max(0, Math.min(100, value));
    const angle = (clampedValue / 100) * 180 - 90;
    
    let statusText = "NEUTRAL";
    let colorClass = "text-gray-500";
    let activeStroke = "#4b5563"; // neutral
    
    if(clampedValue <= 20) { statusText = "STRONG SELL"; colorClass = "text-cyber-pink animate-pulse"; activeStroke = "#ff003c"; }
    else if(clampedValue <= 40) { statusText = "SELL"; colorClass = "text-red-500"; activeStroke = "#ef4444"; }
    else if(clampedValue >= 80) { statusText = "STRONG BUY"; colorClass = "text-cyber-cyan animate-pulse"; activeStroke = "#00f0ff"; }
    else if(clampedValue >= 60) { statusText = "BUY"; colorClass = "text-blue-500"; activeStroke = "#3b82f6"; }

    return (
        <div 
            className="flex flex-col items-center justify-center p-5 cyber-panel w-full transform transition-all duration-300 hover:scale-[1.02] hover:shadow-[0_0_15px_rgba(0,240,255,0.3)] opacity-0 animate-fade-in-up"
            style={{ animationDelay: delay }}
        >
            <h3 className="text-xs font-display font-bold text-cyber-yellow mb-3 tracking-[0.2em]">{label}</h3>
            <svg width="140" height="80" viewBox="0 0 120 70" className="relative z-10 drop-shadow-[0_0_10px_rgba(0,240,255,0.2)]">
                {/* Background Arc */}
                <path d="M 10 60 A 50 50 0 0 1 110 60" fill="none" stroke="#111" strokeWidth="8" strokeLinecap="square" />
                
                {/* Colored Arcs */}
                <path d="M 10 60 A 50 50 0 0 1 24.6 24.6" fill="none" stroke="#ff003c" strokeWidth="8" strokeLinecap="square" className="transition-all duration-500" />
                <path d="M 24.6 24.6 A 50 50 0 0 1 50 11.2" fill="none" stroke="#990033" strokeWidth="8" className="transition-all duration-500" />
                <path d="M 50 11.2 A 50 50 0 0 1 70 11.2" fill="none" stroke="#333" strokeWidth="8" className="transition-all duration-500" />
                <path d="M 70 11.2 A 50 50 0 0 1 95.4 24.6" fill="none" stroke="#0088aa" strokeWidth="8" className="transition-all duration-500" />
                <path d="M 95.4 24.6 A 50 50 0 0 1 110 60" fill="none" stroke="#00f0ff" strokeWidth="8" strokeLinecap="square" className="transition-all duration-500" />
                
                {/* Active Indicator Arc Overlay (Glow) */}
                <path d="M 10 60 A 50 50 0 0 1 110 60" fill="none" stroke={activeStroke} strokeWidth="8" strokeLinecap="square" className="opacity-80 mix-blend-screen" style={{clipPath: `inset(0 ${100 - clampedValue}% 0 0)`}}/>

                {/* Cyber Needle */}
                <g transform={`translate(60, 60) rotate(${angle})`} style={{ transition: 'transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
                    <polygon points="-2,-45 2,-45 4,0 -4,0" fill="#fcee0a" className="drop-shadow-[0_0_5px_rgba(252,238,10,0.8)]" />
                    <rect x="-4" y="-4" width="8" height="8" fill="#fcee0a" />
                    <rect x="-2" y="-2" width="4" height="4" fill="#000" />
                </g>
            </svg>
            <div className={`mt-3 font-display font-bold text-lg transition-colors duration-500 ${colorClass} drop-shadow-md`}>{statusText}</div>
        </div>
    );
};

const IndicatorTable = ({ title, data, delay }) => (
    <div 
        className="cyber-panel flex flex-col h-full opacity-0 animate-fade-in-up transition-all duration-300 hover:shadow-[0_0_20px_rgba(0,240,255,0.15)]"
        style={{ animationDelay: delay }}
    >
        <div className="px-5 py-3 border-b border-cyber-cyan/30 bg-cyber-dark flex justify-between items-center relative overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-r from-cyber-cyan/10 to-transparent animate-pulse-slow pointer-events-none"></div>
            <h3 className="font-display font-bold text-gray-200 relative z-10 flex items-center gap-2 text-sm tracking-wider">
                <span className="w-2 h-4 bg-cyber-cyan"></span>
                {title}
            </h3>
            <span className="text-[10px] font-mono bg-cyber-darker px-2 py-1 border border-cyber-cyan/20 text-cyber-cyan relative z-10">{data.length} VALS</span>
        </div>
        <div className="overflow-x-auto flex-1 p-2">
            <table className="w-full text-sm text-left text-gray-400">
                <thead className="text-[10px] text-cyber-yellow tracking-[0.2em] font-display bg-transparent border-b border-cyber-yellow/20">
                    <tr>
                        <th className="px-4 py-2 font-medium">SYS_NAME</th>
                        <th className="px-4 py-2 font-medium text-right">METRIC</th>
                        <th className="px-4 py-2 font-medium text-right">STATE</th>
                    </tr>
                </thead>
                <tbody className="divide-y divide-gray-800/50">
                    {data.map((row, i) => {
                        let actionColor = "text-gray-500";
                        if (row.action.includes("Buy")) actionColor = "text-cyber-cyan drop-shadow-[0_0_5px_rgba(0,240,255,0.8)]";
                        if (row.action.includes("Sell")) actionColor = "text-cyber-pink drop-shadow-[0_0_5px_rgba(255,0,60,0.8)]";
                        
                        return (
                            <tr key={i} className="hover:bg-cyber-cyan/10 transition-all duration-200 hover:-translate-y-0.5 group">
                                <td className="px-4 py-2.5 group-hover:text-cyber-cyan transition-colors font-medium">{row.name}</td>
                                <td className="px-4 py-2.5 font-mono text-gray-300 text-right group-hover:text-white transition-colors">{row.value}</td>
                                <td className={`px-4 py-2.5 font-display font-bold text-right ${actionColor} transition-colors uppercase`}>{row.action}</td>
                            </tr>
                        );
                    })}
                </tbody>
            </table>
        </div>
    </div>
);

// -------------------------------------------------------------
// MAIN APP COMPONENT
// -------------------------------------------------------------

const App = () => {
    const [activeTab, setActiveTab] = useState("dashboard");
    
    // AI State
    const [timeLeft, setTimeLeft] = useState(300); // 5 minutes
    const [currentPrediction, setCurrentPrediction] = useState({
        direction: "BUY",
        confidence: 87,
        logic: "Oscillators neutral. EMA crossovers trigger BUY threshold on 5m timeframe.",
        timestamp: new Date()
    });
    
    // Gauge values (mocked, slowly changing)
    const [gauges, setGauges] = useState({
        oscillators: 52,
        summary: 65,
        movingAverages: 78
    });

    // History and Learning
    const [history, setHistory] = useState([
        { id: 1, time: "12:00", pair: "EUR/USD", dir: "BUY", conf: 82, result: "Win" },
        { id: 2, time: "12:05", pair: "EUR/USD", dir: "SELL", conf: 76, result: "Loss" },
        { id: 3, time: "12:10", pair: "EUR/USD", dir: "BUY", conf: 89, result: "Win" },
        { id: 4, time: "12:15", pair: "EUR/USD", dir: "BUY", conf: 91, result: "Win" },
    ]);
    
    const [terminalLogs, setTerminalLogs] = useState([
        { id: 1, msg: "[SYS] Initializing DDY Neural Net..." },
        { id: 2, msg: "[DATA] Connected to real-time OHLCV exchange socket." },
    ]);
    
    const terminalRef = useRef(null);
    
    // Timer Effect
    useEffect(() => {
        const timer = setInterval(() => {
            setTimeLeft(prev => {
                if (prev <= 1) {
                    generateNewSignal();
                    return 300;
                }
                return prev - 1;
            });
        }, 1000);
        return () => clearInterval(timer);
    }, []);

    // Randomize gauges slightly
    useEffect(() => {
        const jitter = setInterval(() => {
            setGauges(prev => ({
                oscillators: Math.min(100, Math.max(0, prev.oscillators + (Math.random() * 8 - 4))),
                summary: Math.min(100, Math.max(0, prev.summary + (Math.random() * 6 - 3))),
                movingAverages: Math.min(100, Math.max(0, prev.movingAverages + (Math.random() * 4 - 2))),
            }));
        }, 2000);
        return () => clearInterval(jitter);
    }, []);
    
    // Terminal Logs Effect
    useEffect(() => {
        const logMessages = [
            "Fetching OHLCV stream > EUR/USD...",
            "Computing Pandas-TA matrix [RSI, MACD, EMA9]...",
            "Analyzing 5m momentum candle topology...",
            "Executing predictive stat-models...",
            "Evaluating t-1 candle result...",
            "Optimizing backprop weights...",
            "Adjusting neural net loss threshold...",
            "Detecting micro-trend reversal signals...",
            "Filtering out noise spikes..."
        ];
        
        let logIdCounter = 3;
        const logInterval = setInterval(() => {
            const msg = logMessages[Math.floor(Math.random() * logMessages.length)];
            const timeStr = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
            
            setTerminalLogs(prev => {
                const newLogs = [...prev, { id: logIdCounter++, msg: `[${timeStr}] ${msg}` }];
                return newLogs.slice(-25); // Keep last 25
            });
        }, 3500);
        
        return () => clearInterval(logInterval);
    }, []);

    // Auto-scroll terminal
    useEffect(() => {
        if (terminalRef.current) {
            terminalRef.current.scrollTo({
                top: terminalRef.current.scrollHeight,
                behavior: 'smooth'
            });
        }
    }, [terminalLogs]);

    const generateNewSignal = () => {
        const isBuy = Math.random() > 0.5;
        const conf = Math.floor(Math.random() * 20) + 75; // 75-95%
        const logics = [
            "Support rejected. RSI bullish divergence detected.",
            "MACD cross < 0. Bearish continuation likely.",
            "Volume spike on breakout. Trend confirmed.",
            "EMA alignment strong. Ignoring overbought signals.",
            "StochRSI cross detected. Reversal imminent.",
            "Bollinger Band squeeze upper boundary breach."
        ];
        
        // Resolve previous signal
        const prevResult = Math.random() > 0.3 ? "Win" : "Loss";
        setHistory(prev => {
            const newHistory = [...prev, {
                id: Date.now(),
                time: currentPrediction.timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                pair: "EUR/USD",
                dir: currentPrediction.direction,
                conf: currentPrediction.confidence,
                result: prevResult
            }];
            return newHistory.slice(-15);
        });

        setCurrentPrediction({
            direction: isBuy ? "BUY" : "SELL",
            confidence: conf,
            logic: logics[Math.floor(Math.random() * logics.length)],
            timestamp: new Date()
        });
    };

    const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    // Stats
    const totalSignals = history.length;
    const wins = history.filter(h => h.result === "Win").length;
    const winRate = totalSignals > 0 ? Math.round((wins / totalSignals) * 100) : 0;

    // Mock Tables
    const oscillatorsData = [
        { name: "Relative Strength Index (14)", value: "54.21", action: "Neutral" },
        { name: "Stochastic %K (14, 3, 3)", value: "78.40", action: "Sell" },
        { name: "Commodity Channel Index (20)", value: "112.50", action: "Buy" },
        { name: "Average Directional Index (14)", value: "22.10", action: "Neutral" },
        { name: "Awesome Oscillator", value: "0.0045", action: "Buy" },
        { name: "Momentum (10)", value: "0.0012", action: "Buy" },
        { name: "MACD Level (12, 26)", value: "-0.0003", action: "Sell" },
    ];

    const maData = [
        { name: "Exponential Moving Average (10)", value: "1.0924", action: "Buy" },
        { name: "Simple Moving Average (10)", value: "1.0921", action: "Buy" },
        { name: "Exponential Moving Average (20)", value: "1.0918", action: "Buy" },
        { name: "Simple Moving Average (20)", value: "1.0915", action: "Buy" },
        { name: "Exponential Moving Average (50)", value: "1.0930", action: "Sell" },
        { name: "Simple Moving Average (50)", value: "1.0935", action: "Sell" },
        { name: "Ichimoku Cloud Base Line (9, 26, 52)", value: "1.0925", action: "Neutral" },
    ];

    return (
        <div className="min-h-screen flex flex-col relative z-10">
            {/* HEADER */}
            <header className="bg-cyber-dark/90 backdrop-blur-md border-b-2 border-cyber-cyan/40 px-6 py-4 flex items-center justify-between sticky top-0 z-50 shadow-[0_0_20px_rgba(0,240,255,0.15)] animate-fade-in">
                <div className="flex items-center gap-4 group">
                    <div className="bg-transparent border-2 border-cyber-cyan p-2 text-cyber-cyan shadow-[0_0_10px_rgba(0,240,255,0.5)] group-hover:shadow-[0_0_20px_rgba(0,240,255,0.8)] transition-all duration-300">
                        <ZapIcon className="animate-glitch" />
                    </div>
                    <div>
                        <h1 className="text-2xl font-display font-black text-white tracking-widest drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]">
                            NEXUS<span className="text-cyber-cyan">.AI</span>
                        </h1>
                        <p className="text-[10px] font-mono text-cyber-yellow font-bold tracking-[0.3em] uppercase mt-0.5">Pred-Engine v2.4 // Online</p>
